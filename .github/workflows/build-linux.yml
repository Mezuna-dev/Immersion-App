name: Build Linux Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libglib2.0-0

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: pyinstaller ImmersionSuite.spec --noconfirm

      - name: Package archive
        run: |
          mkdir -p installer/output
          tar -czf installer/output/ImmersionSuite_v1.1.0_Linux_x86_64.tar.gz -C dist ImmersionSuite

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmersionSuite-v1.1.0-Linux-x86_64
          path: installer/output/*.tar.gz
          retention-days: 30

      # If triggered by a version tag, attach the archive to a GitHub Release
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/*.tar.gz
