name: Build Linux Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libglib2.0-0 \
            makeself

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build executable with PyInstaller
        run: pyinstaller ImmersionSuite.spec --noconfirm

      - name: Add icon and setup script to bundle
        run: |
          python3 - <<'PYEOF'
          from PIL import Image
          img = Image.open("installer/icon.ico")
          sizes = [s for s in img.info.get("sizes", [(256, 256)])]
          best = max(sizes) if sizes else (256, 256)
          img.size = best
          img.save("dist/ImmersionSuite/icon.png", format="PNG")
          PYEOF
          cp installer/linux_setup.sh dist/ImmersionSuite/linux_setup.sh
          chmod +x dist/ImmersionSuite/linux_setup.sh

      - name: Build self-extracting installer
        run: |
          mkdir -p installer/output
          makeself dist/ImmersionSuite \
            installer/output/ImmersionSuite_v1.1.0_Linux_x86_64.run \
            "Immersion Suite v1.1.0" \
            ./linux_setup.sh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmersionSuite-v1.1.0-Linux-x86_64
          path: installer/output/*.run
          retention-days: 30

      # If triggered by a version tag, attach the installer to a GitHub Release
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/*.run
