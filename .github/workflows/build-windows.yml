name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: pyinstaller ImmersionSuite.spec --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Create installer output directory
        run: New-Item -ItemType Directory -Force installer\output
        shell: pwsh

      - name: Compile installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer\ImmersionSuite_Setup.iss'
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmersionSuite-v1.1.0-Windows-Setup
          path: installer\output\*.exe
          retention-days: 30

      # If triggered by a version tag, attach the installer to a GitHub Release
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer\output\*.exe
