<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap CSS -->
    <link href="../bootstrap/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap JavaScript (needed for interactive components) -->
    <script src="../bootstrap/js/bootstrap.bundle.js"></script>

    <!-- Qt Web Channel -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    
    <script>
        var bridge;
        new QWebChannel(qt.webChannelTransport, function(channel) {
            bridge = channel.objects.bridge;
        });
        
        function startReview() {
            if (bridge) bridge.startReview();
        }
        
        function browseDeck() {
            if (bridge) bridge.browseDeck();
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h1 class="display-4">Immersion Suite</h1>
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Cards Due</h5>
                        <p class="card-text display-6">{{due_cards}}</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">New Cards</h5>
                        <p class="card-text display-6">{{new_cards}}</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-4">
            <button class="btn btn-primary btn-lg me-2" onclick="startReview()">Start Review</button>
            <button class="btn btn-secondary btn-lg" onclick="browseDeck()">Browse Decks</button>
        </div>
    </div>
</body>
</html>
