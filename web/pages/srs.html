<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="../styles/bootstrap/css/bootstrap.css" rel="stylesheet">
    <link href="../styles/custom/dashboard.css" rel="stylesheet">
    <script src="../styles/bootstrap/js/bootstrap.bundle.js"></script>
    <!-- Qt Web Channel -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <title>Review - Immersion App</title>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        var bridge;
        new QWebChannel(qt.webChannelTransport, function(channel) {
            bridge = channel.objects.bridge;
        });
        
        function goToDashboard() {
            if (bridge) bridge.goToDashboard();
        }
    </script>
</head>
<body>
    <div class="container-fluid p-4 bg-dashboard">
        <div class="row">
            <div class="col-md-2 sidebar-color text-white rounded shadow sidebar-container" id="sidebar" style="height: calc(100vh - 2rem);">
                <button class="btn btn-dark toggle-btn" onclick="toggleSidebar()">
                    ☰
                </button>
                
                <div class="sidebar-content">
                    <div class="h1 pt-3 m-3 text-left h1-font">Anki</div>
                    <div class="list-group sidebar-buttons">
                        <a href="#" class="btn btn-dark dashboard-buttons" onclick="goToDashboard()">Dashboard</a>
                        <a href="#" class="btn btn-dark dashboard-buttons">SRS</a>
                        <a href="#" class="btn btn-dark dashboard-buttons">Immersion</a>
                        <a href="#" class="btn btn-dark dashboard-buttons">Settings</a>
                        <a href="#" class="btn btn-dark dashboard-buttons">About</a>
                    </div>
                </div>
            </div>
            <div class="col bg-main p-5" style="height: calc(100vh - 2rem); overflow-y: hidden;">
                <div class="text-white">
                    <h1 class="mb-4">Review Session</h1>
                    
                    <!-- Review content will go here -->
                    <p>Review screen content...</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
