<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="../styles/bootstrap/css/bootstrap.css" rel="stylesheet">
    <link href="../styles/custom/dashboard.css" rel="stylesheet">
    <script src="../styles/bootstrap/js/bootstrap.bundle.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <title>Immersion App</title>

    <script>
        var bridge;
        new QWebChannel(qt.webChannelTransport, function(channel) {
            bridge = channel.objects.bridge;
            bridge.refreshStats();
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(function(el) {
                el.classList.add('view-hidden');
            });
            document.getElementById(viewId + '-view').classList.remove('view-hidden');
            if (viewId === 'dashboard' && bridge) {
                bridge.refreshStats();
            }
        }

        function updateStats(due, newCards) {
            document.getElementById('due-cards').textContent = due;
            document.getElementById('new-cards').textContent = newCards;
        }
    </script>
</head>
<body>
    <div class="container-fluid p-4 bg-dashboard">
        <div class="row">
            <div class="col-md-2 sidebar-color text-white rounded shadow sidebar-container" id="sidebar" style="height: calc(100vh - 2rem);">
                <button class="btn btn-dark toggle-btn" onclick="toggleSidebar()">
                    ☰
                </button>

                <div class="sidebar-content">
                    <div class="h1 pt-3 m-3 text-left h1-font">Anki</div>
                    <div class="list-group sidebar-buttons">
                        <a href="#" class="btn btn-dark dashboard-buttons" onclick="showView('dashboard')">Dashboard</a>
                        <a href="#" class="btn btn-dark dashboard-buttons" onclick="showView('srs')">SRS</a>
                        <a href="#" class="btn btn-dark dashboard-buttons" onclick="showView('immersion')">Immersion</a>
                        <a href="#" class="btn btn-dark dashboard-buttons" onclick="showView('settings')">Settings</a>
                        <a href="#" class="btn btn-dark dashboard-buttons" onclick="showView('about')">About</a>
                    </div>
                </div>
            </div>

            <div class="col bg-main p-5" style="height: calc(100vh - 2rem); overflow-y: hidden;">

                <!-- Dashboard View -->
                <div id="dashboard-view" class="view-section text-white">
                    <h1 class="mb-4">Dashboard</h1>
                    <div class="row">
                        <div class="col-md-4 mb-4">
                            <div class="card text-white" style="background-color: #9067C6;">
                                <div class="card-body">
                                    <h5>Cards Due</h5>
                                    <p class="display-4" id="due-cards">—</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4 mb-4">
                            <div class="card text-white" style="background-color: #9067C6;">
                                <div class="card-body">
                                    <h5>New Cards</h5>
                                    <p class="display-4" id="new-cards">—</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SRS View -->
                <div id="srs-view" class="view-section view-hidden text-white">
                    <h1 class="mb-4">Decks</h1>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
