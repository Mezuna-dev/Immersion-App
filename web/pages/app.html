<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="../styles/bootstrap/css/bootstrap.css" rel="stylesheet">
    <link href="../styles/custom/dashboard.css" rel="stylesheet">
    <script src="../styles/bootstrap/js/bootstrap.bundle.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <title>Immersion App</title>

    <script>
        var bridge;
        new QWebChannel(qt.webChannelTransport, function(channel) {
            bridge = channel.objects.bridge;
            bridge.refreshStats();
        });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(function(el) {
                el.classList.add('view-hidden');
            });
            document.getElementById(viewId + '-view').classList.remove('view-hidden');
            if (viewId === 'dashboard' && bridge) {
                bridge.refreshStats();
            }
            if (viewId === 'srs' && bridge) {
                bridge.getDecks();
            }
        }

        function updateStats(due, newCards) {
            document.getElementById('due-cards').textContent = due;
            document.getElementById('new-cards').textContent = newCards;
        }

        function updateDecks(decks) {
            var container = document.getElementById('deck-list');
            container.innerHTML = '';
            if (decks.length === 0) {
                container.innerHTML = '<p class="text">No decks found. Create or import a deck to get started.</p>';
                return;
            }
            decks.forEach(function(deck) {
                var card = document.createElement('div');
                card.className = 'card text-white mb-3';
                card.style.backgroundColor = '#9067C6';
                card.style.cursor = 'pointer';
                card.style.marginRight = '300px';
                card.style.animation = 'fadeIn 0.6s ease';
                card.innerHTML =
                    '<div class="card-body rounded d-flex justify-content-between align-items-center" style="background-color: #9067C6;">' +
                        '<h5 class="card-title mb-0">' + deck.name + '</h5>' +
                        '<div class="d-flex gap-3">' +
                            '<span class="badge" style="background-color:#2d2a3e; font-size:0.9rem;">' + deck.due + ' due</span>' +
                            '<span class="badge" style="background-color:#2d2a3e; font-size:0.9rem;">' + deck.new + ' new</span>' +
                        '</div>' +
                    '</div>';
                container.appendChild(card);
            });
        }
    </script>
</head>
<body>
    <div class="container-fluid p-4 bg-dashboard">
        <div class="row">
            <div class="col-md-2 sidebar-color text-white rounded shadow sidebar-container" id="sidebar" style="height: calc(100vh - 2rem);">
                <button class="btn btn-dark toggle-btn" onclick="toggleSidebar()">
                    ☰
                </button>

                <div class="sidebar-content">
                    <div class="h1 pt-3 m-3 text-left h1-font">Anki</div>
                    <div class="list-group sidebar-buttons">
                        <a href="#" class="btn btn-dark dashboard-buttons" onclick="showView('dashboard')">Dashboard</a>
                        <a href="#" class="btn btn-dark dashboard-buttons" onclick="showView('srs')">SRS</a>
                        <a href="#" class="btn btn-dark dashboard-buttons" onclick="showView('immersion')">Immersion</a>
                        <a href="#" class="btn btn-dark dashboard-buttons" onclick="showView('settings')">Settings</a>
                        <a href="#" class="btn btn-dark dashboard-buttons" onclick="showView('about')">About</a>
                    </div>
                </div>
            </div>

            <div class="col bg-main p-5" style="height: calc(100vh - 2rem); overflow-y: hidden;">

                <!-- Dashboard View -->
                <div id="dashboard-view" class="view-section text-white">
                    <h1 class="mb-4">Dashboard</h1>
                    <div class="row">
                        <div class="col-md-4 mb-4">
                            <div class="card text-white" style="background-color: #9067C6;">
                                <div class="card-body">
                                    <h5>Cards Due</h5>
                                    <p class="display-4" id="due-cards">—</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4 mb-4">
                            <div class="card text-white" style="background-color: #9067C6;">
                                <div class="card-body">
                                    <h5>New Cards</h5>
                                    <p class="display-4" id="new-cards">—</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SRS View -->
                <div id="srs-view" class="view-section view-hidden text-white">
                    <row class="">
                    <h1 class="mb-4">Decks</h1>
                    <a href="#" class="btn btn-dark" style="margin-left: 2rem; margin-top: .5rem; background-color: #9067C6; animation: fadeIn 0.6s ease;">Create Deck</a>
                    <a href="#" class="btn btn-dark" style="margin-left: 1rem; margin-top: .5rem; background-color: #9067C6; animation: fadeIn 0.6s ease;">Import Deck</a>
                    </row>
                    <div id="deck-list"></div>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
